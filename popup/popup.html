<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="popupTitle">Speed Controller</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="toast-container" id="toastContainer"></div>

  <div class="popup-container" id="popupContainer">
    <header class="popup-header">
      <div class="logo-row">
        <span class="logo-icon">⚡</span>
        <h1 class="logo-text" data-i18n="popupTitle">Speed Controller</h1>
      </div>
      <div class="status-badge" id="statusBadge">
        <span class="status-dot" id="statusDot"></span>
        <span class="status-text" id="statusText" data-i18n="connecting">Connecting...</span>
      </div>
    </header>

    <section class="speed-display">
      <div class="speed-value" id="speedValue">1.0x</div>
      <div class="speed-label" data-i18n="currentSpeed">Current Speed</div>
    </section>

    <section class="speed-slider-section">
      <input type="range" id="speedSlider" class="speed-slider" min="0.1" max="16" step="0.05" value="1">
      <div class="slider-labels"><span>0.1x</span><span>8x</span><span>16x</span></div>
    </section>

    <section class="speed-controls">
      <button class="ctrl-btn decrease-btn" id="decreaseBtn" data-i18n="decreaseSpeed" data-i18n-attr="title">
        <span class="ctrl-icon">−</span>
      </button>
      <button class="ctrl-btn reset-btn" id="resetBtn" data-i18n="resetBtn">Reset</button>
      <button class="ctrl-btn increase-btn" id="increaseBtn" data-i18n="increaseSpeed" data-i18n-attr="title">
        <span class="ctrl-icon">+</span>
      </button>
    </section>

    <section class="quick-speeds">
      <div class="section-label" data-i18n="quickSpeeds">Quick Speeds</div>
      <div class="quick-buttons" id="quickButtons"></div>
    </section>

    <section class="custom-speed">
      <div class="section-label" data-i18n="customSpeed">Custom Speed</div>
      <div class="custom-input-row">
        <input type="number" id="customSpeedInput" class="custom-input" min="0.1" max="16" step="0.05"
          data-i18n="customSpeedPlaceholder" data-i18n-attr="placeholder" placeholder="e.g., 1.85">
        <button class="apply-btn" id="applyCustomBtn" data-i18n="applyBtn">Apply</button>
      </div>
    </section>

    <footer class="popup-footer">
      <button class="footer-link" id="optionsBtn">⚙ <span data-i18n="settingsBtn">Settings</span></button>
      <span class="version">v1.0.0</span>
    </footer>
  </div>

  <script src="../utils/storage.js"></script>
  <script src="../utils/i18n.js"></script>
  <script src="popup.js"></script>
</body>
</html>
